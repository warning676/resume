<div class="page-intro">
    <h2>COURSES</h2>
    <p>A list of courses I have completed, am currently taking, or plan to take.</p>
</div>

<div class="courses-controls">
    <div class="search-box">
        <div class="search-container">
            <input type="text" id="courses-search-input" class="custom-input" placeholder="Search courses..." autocomplete="off">
        </div>
    </div>
    <div class="filter-group">
        <label>Sort By:</label>
        <div id="course-sort-select" class="custom-select-container"></div>
    </div>
    <div class="filter-group">
        <label>Order:</label>
        <div id="course-order-select" class="custom-select-container"></div>
    </div>
    <div class="filter-group course-filter-group">
        <label>FILTER:</label>
        <button id="courses-filter-button" class="filter-icon-button" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="courses-filter-menu" aria-label="Filter courses">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
                <path d="M3 6h18M7 12h10M10 18h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </button>
        <div id="courses-filter-menu" class="column-filter-menu" role="menu" aria-label="Course column filters"></div>
    </div>
</div>

<div id="courses-search-status" class="page-search-status" style="display:none;"></div>

<div class="courses-table-shell">
    <table class="courses-table" id="courses-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>School</th>
                <th>Type</th>
                <th>Status</th>
                <th>Grade</th>
                <th>Credits Earned</th>
            </tr>
        </thead>
        <tbody id="courses-table-body">
            <tr>
                <td colspan="7" class="courses-loading-row">Loading courses...</td>
            </tr>
        </tbody>
    </table>
</div>

<div id="courses-modal" class="modal" aria-hidden="true">
    <div class="modal-content courses-modal-content">
        <button id="courses-modal-prev" class="modal-nav-btn prev" aria-label="Previous course"></button>
        <button id="courses-modal-next" class="modal-nav-btn next" aria-label="Next course"></button>
        <div class="modal-header">
            <div>
                <h2 id="courses-modal-title">Course Details</h2>
            </div>
            <button id="courses-modal-close" class="close-button" aria-label="Close course details"></button>
        </div>
        <div class="courses-modal-body">
            <div class="courses-modal-grid">
                <div>
                    <small>ID</small>
                    <strong id="courses-modal-id">-</strong>
                </div>
                <div>
                    <small>School</small>
                    <strong id="courses-modal-school">-</strong>
                </div>
                <div>
                    <small>Type</small>
                    <strong id="courses-modal-type">-</strong>
                </div>
                <div>
                    <small>Status</small>
                    <strong id="courses-modal-status">-</strong>
                </div>
                <div>
                    <small>Grade</small>
                    <strong id="courses-modal-grade">-</strong>
                </div>
                <div>
                    <small>Credits Earned</small>
                    <strong id="courses-modal-credits">-</strong>
                </div>
            </div>
            <small style="display:block;color:#8b949e;font-size:.75rem;text-transform:uppercase;letter-spacing:.4px;margin-top:14px;margin-bottom:6px;">INFO</small>
            <p id="courses-modal-info" class="courses-modal-info"></p>
        </div>
    </div>
</div>

<div data-fragment="modals"></div>
